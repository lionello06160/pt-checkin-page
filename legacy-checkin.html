<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PT Check-in</title>
    <style>
      body {
        margin: 0;
        background: #f6f5f0;
        color: #17211d;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      }
      main {
        max-width: 560px;
        margin: 0 auto;
        padding: 22px 16px 120px;
      }
      h1 {
        margin: 0 0 14px;
        font-size: 34px;
        line-height: 1.05;
      }
      h2 {
        margin: 28px 0 12px;
        font-size: 24px;
      }
      label {
        display: block;
        margin: 12px 0;
        color: #62706a;
        font-size: 14px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 6px;
        padding: 12px;
        border: 1px solid #d8d4c8;
        border-radius: 8px;
        background: #fffdf7;
        font-size: 17px;
      }
      button {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        background: #1f6f5b;
        color: white;
        font-size: 17px;
        font-weight: 700;
      }
      button:disabled {
        opacity: .55;
      }
      .cute-login-loader {
        display: none;
        justify-items: center;
        gap: 8px;
        margin-top: 14px;
        padding: 18px 14px;
        border: 1px solid #d8d4c8;
        border-radius: 18px;
        background: #fffaf0;
        text-align: center;
      }
      .cute-login-loader.is-visible {
        display: grid;
      }
      .cute-mascot {
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        border-radius: 999px;
        background: #e8f3ed;
        font-size: 31px;
        animation: cute-bounce 1.1s ease-in-out infinite;
      }
      .cute-bubbles {
        display: flex;
        gap: 7px;
        min-height: 12px;
        align-items: center;
      }
      .cute-bubbles span {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #1f6f5b;
        animation: cute-dot 1s ease-in-out infinite;
      }
      .cute-bubbles span:nth-child(2) {
        animation-delay: .15s;
        background: #bd5b2f;
      }
      .cute-bubbles span:nth-child(3) {
        animation-delay: .3s;
      }
      .cute-loader-text {
        color: #17211d;
        font-size: 16px;
        font-weight: 800;
      }
      .cute-loader-subtext {
        color: #62706a;
        font-size: 13px;
      }
      @keyframes cute-bounce {
        0%, 100% { transform: translateY(0) rotate(-4deg); }
        50% { transform: translateY(-7px) rotate(5deg); }
      }
      @keyframes cute-dot {
        0%, 80%, 100% { transform: translateY(0); opacity: .45; }
        40% { transform: translateY(-6px); opacity: 1; }
      }
      .panel, .date-group {
        background: #fffdf7;
        border: 1px solid #d8d4c8;
        border-radius: 8px;
        padding: 16px;
        margin: 12px 0;
      }
      .muted {
        color: #62706a;
      }
      .logged-in .page-title,
      .logged-in .page-subtitle {
        display: none;
      }
      .date-group {
        padding: 0;
        overflow: hidden;
      }
      .date-heading {
        padding: 12px 16px;
        border-bottom: 1px solid #e5e0d4;
      }
      .date-heading strong {
        display: block;
        font-size: 18px;
      }
      .date-heading span {
        display: block;
        margin-top: 3px;
        color: #62706a;
        font-size: 14px;
      }
      .session-row {
        display: -webkit-box;
        display: flex;
        -webkit-box-pack: justify;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        padding: 11px 16px;
        border-top: 1px solid #eee9dc;
      }
      .date-heading + .session-row {
        border-top: 0;
      }
      .session-main {
        min-width: 0;
      }
      .session-time {
        display: block;
        font-size: 20px;
        font-weight: 800;
        line-height: 1.1;
      }
      .session-meta {
        display: block;
        margin-top: 4px;
        color: #62706a;
        font-size: 14px;
      }
      .session-action {
        flex: 0 0 auto;
        margin: 0;
        color: #17211d;
        white-space: nowrap;
      }
      .session-action input {
        width: 30px;
        height: 30px;
        margin: 0;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .status-text {
        font-weight: 700;
        color: #236c45;
        white-space: nowrap;
      }
      .bar {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 16px;
        max-width: 560px;
        margin: 0 auto;
        background: #fffdf7;
        border: 1px solid #d8d4c8;
        border-radius: 8px;
        padding: 14px;
      }
      .toast {
        position: fixed;
        left: 20px;
        right: 20px;
        bottom: 96px;
        background: #17211d;
        color: white;
        padding: 14px;
        border-radius: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="page-title">Teacher Check-In</h1>
      <p class="muted page-subtitle">Legacy phone page</p>

      <section id="login" class="panel">
        <label>Teacher ID
          <input id="code" inputmode="numeric" autocomplete="username">
        </label>
        <label>Birth Date (4 digits)
          <input id="birth4" inputmode="numeric" maxlength="4" autocomplete="current-password">
        </label>
        <button id="loginBtn">Log in</button>
        <div id="loginLoader" class="cute-login-loader" aria-live="polite">
          <div class="cute-mascot" aria-hidden="true">🐾</div>
          <div class="cute-bubbles" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="cute-loader-text">Checking your schedule...</div>
          <div class="cute-loader-subtext">Please wait a moment</div>
        </div>
      </section>

      <section id="dashboard" style="display:none">
        <h2 id="teacherName"></h2>
        <h2>Today</h2>
        <div id="today"></div>
        <h2>Missed Check-Ins</h2>
        <div id="missed"></div>
        <h2>Completed</h2>
        <div id="completed"></div>
      </section>
    </main>

    <div id="bar" class="bar" style="display:none">
      <p id="count">0 selected</p>
      <button id="submitBtn">Confirm Check-In</button>
    </div>
    <div id="toast" class="toast"></div>

    <script>
      var API_URL = 'https://script.google.com/macros/s/AKfycby-5DPJlKw-RYUjJQawsCY8gzZPP54QZ_dqWhm-UnPLd82ghGu5jE80L9P1J0HYxXTr/exec';
      var qrToken = getParam('t') || getParam('token');
      var loginToken = '';
      var callbackIndex = 0;
      var currentTeacher = null;
      var SERVER_TIMEOUT_MS = 90000;

      function getParam(name) {
        var query = window.location.search.replace(/^\?/, '').split('&');
        for (var i = 0; i < query.length; i += 1) {
          var pair = query[i].split('=');
          if (decodeURIComponent(pair[0] || '') === name) return decodeURIComponent(pair.slice(1).join('=') || '');
        }
        return '';
      }

      function jsonp(params, done) {
        var cb = 'legacyJsonp' + (++callbackIndex);
        var finished = false;
        params.callback = cb;
        var timer = window.setTimeout(function() {
          if (finished) return;
          finished = true;
          try { delete window[cb]; } catch (error) { window[cb] = null; }
          if (script && script.parentNode) script.parentNode.removeChild(script);
          done({ ok: false, error: 'The server is taking too long to respond. Please try again, or use a newer phone browser.' });
        }, SERVER_TIMEOUT_MS);
        window[cb] = function(response) {
          if (finished) return;
          finished = true;
          window.clearTimeout(timer);
          try { delete window[cb]; } catch (error) { window[cb] = null; }
          if (script.parentNode) script.parentNode.removeChild(script);
          done(response);
        };
        var parts = [];
        for (var key in params) {
          if (params.hasOwnProperty(key)) parts.push(encodeURIComponent(key) + '=' + encodeURIComponent(params[key]));
        }
        var script = document.createElement('script');
        script.src = API_URL + '?' + parts.join('&');
        script.onerror = function() {
          if (finished) return;
          finished = true;
          window.clearTimeout(timer);
          try { delete window[cb]; } catch (error) { window[cb] = null; }
          done({ ok: false, error: 'Network error. Please try again.' });
        };
        document.body.appendChild(script);
      }

      function toast(message) {
        var node = document.getElementById('toast');
        node.innerHTML = escapeHtml(message);
        node.style.display = 'block';
        window.clearTimeout(window.toastTimer);
        window.toastTimer = window.setTimeout(function() { node.style.display = 'none'; }, 3200);
      }

      function setButton(button, busy, label) {
        if (!button) return;
        if (!button.getAttribute('data-label')) button.setAttribute('data-label', button.innerHTML);
        button.disabled = !!busy;
        button.innerHTML = busy ? label : button.getAttribute('data-label');
        if (button.id === 'loginBtn') {
          setLoginLoader(busy);
        }
      }

      function setLoginLoader(visible) {
        var loader = document.getElementById('loginLoader');
        if (!loader) return;
        if (visible) {
          loader.className = 'cute-login-loader is-visible';
        } else {
          loader.className = 'cute-login-loader';
        }
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function parseCourseName(courseName) {
        var match = String(courseName || '').match(/^([A-Za-z]{3})\s+(.+)$/);
        return {
          weekday: match ? match[1] : '',
          time: (match ? match[2] : String(courseName || '')).replace(/(\d{2}:\d{2})-(\d{2}:\d{2})/, '$1–$2')
        };
      }

      function formatHours(hours) {
        var value = Number(hours || 0);
        if (value === 1) return '1 hr';
        if (value && Math.floor(value) !== value) return value + ' hrs';
        return (value || 0) + ' hrs';
      }

      function formatDateHeading(date, fallbackWeekday) {
        var parts = String(date || '').split('-');
        if (parts.length !== 3) return { title: date || 'Unknown date', detail: fallbackWeekday || '' };
        var parsed = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        if (isNaN(parsed.getTime())) return { title: date, detail: fallbackWeekday || '' };
        var weekday = fallbackWeekday || ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][parsed.getDay()];
        var month = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][parsed.getMonth()];
        var readable = weekday + ', ' + month + ' ' + parsed.getDate() + ', ' + parsed.getFullYear();
        return {
          title: readable,
          detail: ''
        };
      }

      function groupByDate(items) {
        var groups = [];
        var byDate = {};
        for (var i = 0; i < items.length; i += 1) {
          var item = items[i];
          var date = item.date || '';
          if (!byDate[date]) {
            byDate[date] = [];
            groups.push({ date: date, items: byDate[date] });
          }
          byDate[date].push(item);
        }
        return groups;
      }

      function renderList(rootId, items, allowCheckin) {
        var root = document.getElementById(rootId);
        if (!items || !items.length) {
          root.innerHTML = '<div class="panel muted">No check-ins to process.</div>';
          return;
        }
        var html = '';
        var groups = groupByDate(items);
        for (var g = 0; g < groups.length; g += 1) {
          var firstCourse = parseCourseName(groups[g].items[0] && groups[g].items[0].courseName);
          var heading = formatDateHeading(groups[g].date, firstCourse.weekday);
          html += '<div class="date-group">';
          html += '<div class="date-heading"><strong>' + escapeHtml(heading.title) + '</strong>';
          if (heading.detail) html += '<span>' + escapeHtml(heading.detail) + '</span>';
          html += '</div>';
          for (var i = 0; i < groups[g].items.length; i += 1) {
            var item = groups[g].items[i];
            var course = parseCourseName(item.courseName);
            html += '<div class="session-row"><div class="session-main">';
            html += '<span class="session-time">' + escapeHtml(course.time) + '</span>';
            html += '<span class="session-meta">' + escapeHtml(formatHours(item.hours)) + '</span>';
            html += '</div>';
            if (item.status === 'ACTIVE') {
              html += '<span class="status-text">Checked in</span>';
            } else if (allowCheckin) {
              html += '<label class="session-action"><input type="checkbox" class="check" data-date="' + escapeHtml(item.date) + '" data-course-id="' + escapeHtml(item.courseId) + '"><span class="sr-only">Select ' + escapeHtml(course.time) + '</span></label>';
            }
            html += '</div>';
          }
          html += '</div>';
        }
        root.innerHTML = html;
      }

      function renderDashboard(data) {
        currentTeacher = data.teacher || currentTeacher;
        document.body.className = (document.body.className ? document.body.className + ' ' : '') + 'logged-in';
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('teacherName').innerHTML = escapeHtml(currentTeacher.Name);
        renderList('today', data.courses.today, true);
        renderList('missed', data.courses.missed, true);
        renderList('completed', data.courses.completed, false);
        updateBar();
      }

      function loadDashboard(onDone) {
        jsonp({
          api: 'dashboard',
          loginToken: loginToken
        }, function(response) {
          if (response.ok) {
            renderDashboard(response.result);
          }
          if (onDone) onDone(response);
        });
      }

      function updateBar() {
        var checks = document.querySelectorAll('.check:checked');
        document.getElementById('count').innerHTML = checks.length + ' selected';
        document.getElementById('bar').style.display = checks.length ? 'block' : 'none';
      }

      document.getElementById('loginBtn').onclick = function() {
        var btn = this;
        if (!qrToken) return toast('Missing QR token. Please scan the on-site QR Code again.');
        setButton(btn, true, 'Checking...');
        jsonp({
          api: 'login',
          qrToken: qrToken,
          code: document.getElementById('code').value,
          birth4: document.getElementById('birth4').value
        }, function(response) {
          setButton(btn, false);
          if (!response.ok) return toast(response.error);
          loginToken = response.result.loginToken;
          currentTeacher = response.result.teacher;
          renderDashboard({ teacher: response.result.teacher, courses: response.result.courses });
        });
      };

      document.body.onchange = function(event) {
        if (event.target && event.target.className === 'check') updateBar();
      };

      document.getElementById('submitBtn').onclick = function() {
        var btn = this;
        var checks = document.querySelectorAll('.check:checked');
        var items = [];
        for (var i = 0; i < checks.length; i += 1) {
          items.push({ date: checks[i].getAttribute('data-date'), courseId: checks[i].getAttribute('data-course-id') });
        }
        if (!items.length) return;
        setButton(btn, true, 'Checking in...');
        jsonp({
          api: 'batchCheckIn',
          loginToken: loginToken,
          items: JSON.stringify(items)
        }, function(response) {
          setButton(btn, false);
          if (!response.ok) return toast(response.error);
          toast(response.result.message || 'Done');
          if (response.result.dashboard || response.result.courses) {
            renderDashboard({ teacher: response.result.teacher || currentTeacher, courses: response.result.dashboard || response.result.courses });
            return;
          }
          loadDashboard(function(refreshResponse) {
            if (!refreshResponse.ok) toast((response.result.message || 'Done') + '. Refresh the page to see the latest check-ins.');
          });
        });
      };
    </script>
  </body>
</html>
